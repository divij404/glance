<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://esm.sh; style-src 'unsafe-inline'; connect-src https://esm.sh;" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';

    window.__React = React;
    window.__createRoot = createRoot;

    window.onerror = (msg, src, line, col, err) => {
      window.parent.postMessage({ type: 'RUNTIME_ERROR', message: msg, stack: err?.stack ?? '' }, '*');
      return true;
    };

    window.addEventListener('unhandledrejection', (e) => {
      window.parent.postMessage({
        type: 'RUNTIME_ERROR',
        message: e.reason?.message ?? String(e.reason),
        stack: e.reason?.stack ?? '',
      }, '*');
    });

    window.addEventListener('message', (e) => {
      if (!e.data) return;

      if (e.data.type === 'SET_THEME') {
        document.body.style.background = e.data.bg;
        return;
      }

      if (e.data.type !== 'UPDATE') return;

      // Clear previous render
      const root = document.getElementById('root');
      root.innerHTML = '';
      const old = document.getElementById('__glance_script__');
      if (old) old.remove();

      try {
        // Execute the IIFE bundle — sets window.__glance_module__
        const script = document.createElement('script');
        script.id = '__glance_script__';
        script.textContent = e.data.code;
        document.body.appendChild(script);

        const mod = window.__glance_module__;
        const Component = mod?.default;

        if (!Component) {
          throw new Error('No default export found. Make sure your component uses export default.');
        }

        const reactRoot = window.__createRoot(document.getElementById('root'));
        reactRoot.render(window.__React.createElement(Component, null));
      } catch (err) {
        window.parent.postMessage({ type: 'RUNTIME_ERROR', message: err.message, stack: err.stack ?? '' }, '*');
      }
    });

    window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
  </script>
</body>
</html>
